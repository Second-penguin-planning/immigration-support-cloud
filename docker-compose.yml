services:
  db:
    image: postgres:16-alpine
    container_name: isc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: immigration_support_dev
    ports:
      - '5432:5432'
    volumes:
      - isc-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  isc-postgres-data:
